<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>App para Bubu 💖</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#db2777">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</head>

<body>
    <main class="app-shell">
        <header class="app-header">
            <div>
                <h1>Bubu 💖</h1>
                <p>Un toque y la app habla por ella.</p>
            </div>
            <div class="header-actions">
                <button id="buttonViewToggle" class="view-toggle-btn">Solo botones</button>
                <button id="themeToggle" class="round-btn" aria-label="Cambiar tema">🌙</button>
            </div>
        </header>

        <section class="chat-card" aria-label="Escribir y hablar">
            <div class="current-message">
                <span>Mensaje actual</span>
                <strong id="currentMessage">Escribe o toca una frase</strong>
            </div>

            <div id="speechIndicator" class="speech-indicator hidden">
                <span></span><span></span><span></span>
            </div>

            <textarea id="textInput" placeholder="Escribe aquí si necesita algo específico..."></textarea>

            <div class="main-actions">
                <button id="speakBtn" class="primary-btn">🔊 Hablar</button>
                <button id="repeatBtn" class="secondary-btn">🔁 Repetir</button>
                <button id="stopBtn" class="secondary-btn">⏹️ Parar</button>
            </div>
        </section>

        <section class="priority-section" aria-label="Frases principales">
            <div id="priorityGrid" class="priority-grid"></div>
        </section>

        <section class="quick-section" aria-label="Frases más comunes">
            <h2>Lo más común</h2>
            <div id="commonGrid" class="common-grid"></div>
        </section>

        <section id="buttonOnlyView" class="button-only-view hidden" aria-label="Vista solo botones">
            <div class="zen-header">
                <div>
                    <h2>Solo botones</h2>
                    <p>Elige una frase y la app habla</p>
                </div>
                <button id="closeButtonViewBtn" class="zen-close-btn" aria-label="Cerrar vista solo botones">×</button>
            </div>
            <div id="categoryBoard" class="category-board"></div>
        </section>

        <section class="quiet-section" aria-label="Ayuda y contacto">
            <button id="helpBtn" class="help-btn">🚨 Amor, ayúdame por favor</button>
            <button id="nurseBtn" class="quiet-btn">👩‍⚕️ Llama a la enfermera</button>
            <button id="whatsappBtn" class="quiet-btn">💬 Mandar WhatsApp</button>
            <button id="clearBtn" class="quiet-btn">🧹 Limpiar texto</button>
            <button id="resetRankingBtn" class="quiet-btn reset-ranking-btn">↺ Reset ranking</button>
        </section>
    </main>

    <div id="resetModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
        <div class="modal-card">
            <h2 id="resetTitle">¿Resetear ranking?</h2>
            <p>Esto pondrá todos los contadores en cero y las frases volverán al orden inicial.</p>
            <div class="modal-actions">
                <button id="cancelResetBtn" class="modal-cancel-btn">No, cancelar</button>
                <button id="confirmResetBtn" class="modal-danger-btn">Sí, resetear</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
