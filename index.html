<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App para Bubu 💖</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#db2777">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</head>

<body>
    <main class="app-shell">
        <header class="app-header">
            <div>
                <h1>Bubu 💖</h1>
                <p>Un toque y la app habla por ella.</p>
            </div>
            <button id="themeToggle" class="round-btn" aria-label="Cambiar tema">🌙</button>
        </header>

        <section class="chat-card" aria-label="Escribir y hablar">
            <div class="current-message">
                <span>Mensaje actual</span>
                <strong id="currentMessage">Escribe o toca una frase</strong>
            </div>

            <div id="speechIndicator" class="speech-indicator hidden">
                <span></span><span></span><span></span>
            </div>

            <textarea id="textInput" placeholder="Escribe aquí si necesita algo específico..."></textarea>

            <div class="main-actions">
                <button id="speakBtn" class="primary-btn">🔊 Hablar</button>
                <button id="repeatBtn" class="secondary-btn">🔁 Repetir</button>
                <button id="stopBtn" class="secondary-btn">⏹️ Parar</button>
            </div>
        </section>

        <section class="priority-section" aria-label="Frases principales">
            <div id="priorityGrid" class="priority-grid"></div>
        </section>

        <section class="quick-section" aria-label="Frases más comunes">
            <h2>Lo más común</h2>
            <div id="commonGrid" class="common-grid"></div>
        </section>

        <section class="quiet-section" aria-label="Ayuda y contacto">
            <button id="helpBtn" class="help-btn">🚨 Amor, ayúdame por favor</button>
            <button id="nurseBtn" class="quiet-btn">👩‍⚕️ Llama a la enfermera</button>
            <button id="whatsappBtn" class="quiet-btn">💬 Mandar WhatsApp</button>
            <button id="clearBtn" class="quiet-btn">🧹 Limpiar texto</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
